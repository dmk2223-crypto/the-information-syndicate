<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<title>THE ARCHIVE — The Information Syndicate</title>

<link rel="preconnect" href="https://fonts.googleapis.com">

<body>
<div class="scanlines" aria-hidden="true"></div>

<main class="terminal">

  <header class="arc-head">
    <a class="backlink" href="index.html">&lsaquo; SYNDICATE://main</a>

  <section id="archive" class="archive" aria-label="video archive">

    &gt; no transmissions found in the log. check videos-data.js
  </p>

  <footer class="baseline arc-baseline">
    <span>SYNDICATE TRANSMISSION LOG</span>
    <span class="baseline-dot">&bull;</span>
    <span>STILL BROADCASTING</span>
  </footer>

</main>

<script src="fit-title.js"></script>
<script src="videos-data.js"></script>

</html>
